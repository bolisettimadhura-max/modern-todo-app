<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taskify - Madhu</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#0f172a;
color:white;
overflow:hidden;
}

.container{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:#111827;
padding:20px;
border-right:1px solid rgba(255,255,255,.1);
}

.logo h2{
color:#60a5fa;
font-size:28px;
}

.logo p{
margin-top:5px;
color:#94a3b8;
}

.dashboard-btn{
width:100%;
padding:12px;
margin-top:20px;
background:#3b82f6;
border:none;
border-radius:12px;
color:white;
cursor:pointer;
}

.section-title{
margin-top:25px;
margin-bottom:10px;
font-size:13px;
color:#94a3b8;
}

.menu li{
list-style:none;
background:#1e293b;
padding:12px;
margin-bottom:10px;
border-radius:10px;
display:flex;
justify-content:space-between;
}

.profile{
margin-top:20px;
background:#1e293b;
padding:15px;
border-radius:15px;
text-align:center;
}

.profile h3{
font-size:24px;
}

.profile p{
color:gold;
}

/* MAIN */

.main{
flex:1;
padding:20px;
display:flex;
flex-direction:column;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.header h1{
font-size:42px;
}

.header p{
color:#94a3b8;
}

.search-box{
display:flex;
align-items:center;
gap:10px;
}

.search-box input{
padding:10px;
width:220px;
border:none;
outline:none;
border-radius:10px;
background:#1e293b;
color:white;
}

.icon{
font-size:20px;
cursor:pointer;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:15px;
}

.card{
background:#1e293b;
padding:18px;
border-radius:15px;
}

.card h2{
color:#60a5fa;
font-size:30px;
}

.card p{
margin-top:5px;
}

/* FORM */

.task-form{
background:#1e293b;
padding:15px;
border-radius:15px;
display:flex;
gap:10px;
margin-bottom:15px;
}

.task-form input,
.task-form select{
flex:1;
padding:12px;
border:none;
outline:none;
border-radius:10px;
background:#0f172a;
color:white;
}

.task-form button{
padding:12px 20px;
background:#3b82f6;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

/* TASK LIST */

.task-list{
flex:1;
overflow-y:auto;
}

.task{
background:#1e293b;
padding:15px;
border-radius:15px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.task.completed{
opacity:.6;
text-decoration:line-through;
}

.task-left h3{
margin-bottom:5px;
}

.task-left p{
font-size:13px;
color:#94a3b8;
}

.tag{
display:inline-block;
margin-top:8px;
padding:5px 10px;
background:#3b82f6;
border-radius:20px;
font-size:12px;
}

.actions button{
width:38px;
height:38px;
border:none;
border-radius:10px;
margin-left:5px;
cursor:pointer;
color:white;
}

.complete{
background:#22c55e;
}

.edit{
background:#3b82f6;
}

.delete{
background:#ef4444;
}

.tip{
margin-top:10px;
background:#1e293b;
padding:12px;
border-radius:12px;
text-align:center;
}

/* MOBILE */

@media(max-width:900px){

.sidebar{
display:none;
}

.stats{
grid-template-columns:repeat(2,1fr);
}

.task-form{
flex-direction:column;
}

.header{
flex-direction:column;
align-items:flex-start;
gap:10px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="sidebar">

<div class="logo">
<h2>✔ Taskify</h2>
<p>Get things done ✨</p>
</div>

<button class="dashboard-btn">
Dashboard
</button>

<div class="section-title">MANAGE</div>

<ul class="menu">
<li>All Tasks <span id="sideTotal">0</span></li>
<li>Pending <span id="sidePending">0</span></li>
<li>Completed <span id="sideCompleted">0</span></li>
</ul>

<div class="profile">
<h3>Madhu</h3>
<p>👑 Premium User</p>
</div>

</div>

<div class="main">

<div class="header">

<div>
<h1>Good Morning, Madhu!</h1>
<p>Let's make today productive.</p>
</div>

<div class="search-box">
<input type="text" placeholder="Search Tasks">
<i class="fa-solid fa-bell icon"></i>
<i class="fa-solid fa-moon icon"></i>
</div>

</div>

<div class="stats">

<div class="card">
<h2 id="total">0</h2>
<p>Total Tasks</p>
</div>

<div class="card">
<h2 id="pending">0</h2>
<p>Pending</p>
</div>

<div class="card">
<h2 id="completed">0</h2>
<p>Completed</p>
</div>

<div class="card">
<h2>🚀</h2>
<p>Stay Productive</p>
</div>

</div>

<div class="task-form">

<input id="taskName"
placeholder="What needs to be done?">

<input type="datetime-local"
id="taskDate">

<select id="taskCategory">
<option>Work</option>
<option>Study</option>
<option>Personal</option>
<option>Health</option>
</select>

<button onclick="addTask()">
Add Task
</button>

</div>

<div class="task-list"
id="taskList"></div>

<div class="tip">
💡 Pro Tip: Complete one task at a time for better productivity.
</div>

</div>

</div>

<script>

let tasks =
JSON.parse(localStorage.getItem("tasks"))
|| [

{
name:"Complete To-Do App Project",
date:"2025-08-15 05:00 PM",
category:"Work",
completed:false
},

{
name:"Attend Online JavaScript Class",
date:"2025-08-16 10:00 AM",
category:"Study",
completed:false
},

{
name:"Buy Groceries",
date:"2025-08-16 06:00 PM",
category:"Personal",
completed:true
},

{
name:"Go To Gym",
date:"2025-08-15 07:00 PM",
category:"Health",
completed:false
},

{
name:"Read 20 Pages Of A Book",
date:"2025-08-16 09:00 PM",
category:"Personal",
completed:false
}

];

function saveTasks(){
localStorage.setItem(
"tasks",
JSON.stringify(tasks)
);
}

function updateStats(){

let total=tasks.length;
let completed=
tasks.filter(t=>t.completed).length;
let pending=total-completed;

document.getElementById("total").innerText=total;
document.getElementById("pending").innerText=pending;
document.getElementById("completed").innerText=completed;

document.getElementById("sideTotal").innerText=total;
document.getElementById("sidePending").innerText=pending;
document.getElementById("sideCompleted").innerText=completed;
}

function renderTasks(){

let taskList=
document.getElementById("taskList");

taskList.innerHTML="";

tasks.forEach((task,index)=>{

let div=document.createElement("div");

div.className=
task.completed?
"task completed":"task";

div.innerHTML=`

<div class="task-left">
<h3>${task.name}</h3>
<p>${task.date}</p>
<span class="tag">${task.category}</span>
</div>

<div class="actions">

<button class="complete"
onclick="toggleTask(${index})">

✔

</button>

<button class="edit"
onclick="editTask(${index})">

✏

</button>

<button class="delete"
onclick="deleteTask(${index})">

🗑

</button>

</div>

`;

taskList.appendChild(div);

});

updateStats();
saveTasks();
}

function addTask(){

let name=
document.getElementById("taskName").value;

let date=
document.getElementById("taskDate").value;

let category=
document.getElementById("taskCategory").value;

if(name==="") return;

tasks.push({
name,
date,
category,
completed:false
});

document.getElementById("taskName").value="";
document.getElementById("taskDate").value="";

renderTasks();
}

function toggleTask(index){

tasks[index].completed=
!tasks[index].completed;

renderTasks();
}

function editTask(index){

let updated=
prompt(
"Edit Task",
tasks[index].name
);

if(updated){

tasks[index].name=updated;

renderTasks();
}

}

function deleteTask(index){

tasks.splice(index,1);

renderTasks();
}

renderTasks();

</script>

</body>
</html>
